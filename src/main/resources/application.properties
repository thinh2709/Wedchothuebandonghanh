spring.application.name=nguyenphucthinh

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/rental_companion_db_realistic?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Lỗi API: hiển thị message từ exception (client đọc được thông báo nghiệp vụ)
server.error.include-message=always

# Check-in GPS: khoảng cách tối đa (mét) giữa khách và companion
booking.checkin.max-distance-meters=200

# Tổng thời gian gia hạn tối đa (phút) trên một đơn (vd 120 = 2h)
booking.extension.max-minutes=1

# Server Port
server.port=8080
# server.address=0.0.0.0
# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.check-template-location=false
