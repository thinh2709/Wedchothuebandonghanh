spring.application.name=nguyenphucthinh

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/rental_companion_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Lỗi API: hiển thị message từ exception (client đọc được thông báo nghiệp vụ)
server.error.include-message=always

# Server Port
server.port=8080
server.address=192.168.1.212
# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.check-template-location=false
