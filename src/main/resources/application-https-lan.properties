# HTTPS trong LAN để điện thoại/máy khác được cấp GPS (SOS).
# 1) Tại thư mục gốc project, tạo file keystore (không commit — đã .gitignore):
#
#    keytool -genkeypair -alias dev -keyalg RSA -keysize 2048 -storetype PKCS12 ^
#      -keystore dev-lan.p12 -validity 3650 -storepass devdev -keypass devdev ^
#      -dname "CN=localhost"
#
#    (Linux/mac: bỏ dấu ^ , gộp thành một dòng.)
#
#    PowerShell nếu `keytool` không có trong PATH — dùng keytool của JDK (Java 25 ví dụ):
#      & "C:\Program Files\Java\jdk-25.0.2\bin\keytool.exe" -genkeypair -alias dev -keyalg RSA -keysize 2048 -storetype PKCS12 -keystore dev-lan.p12 -validity 3650 -storepass devdev -keypass devdev -dname "CN=localhost"
#    (Đổi đường dẫn cho khớp %JAVA_HOME%; file dev-lan.p12 phải nằm cùng thư mục với pom.xml —
#     là thư mục bạn chạy .\mvnw.cmd từ đó.)
#
# 2) Chạy app (profile Spring = https-lan):
#    CMD / bash:
#      ./mvnw spring-boot:run -Dspring-boot.run.profiles=https-lan
#    Windows PowerShell (bắt buộc đặt trong ngoặc kép vì -D bị PowerShell ăn mất):
#      .\mvnw.cmd spring-boot:run "-Dspring-boot.run.profiles=https-lan"
#    Hoặc:
#      $env:SPRING_PROFILES_ACTIVE="https-lan"; .\mvnw.cmd spring-boot:run
#
# 3) Trên điện thoại (cùng Wi‑Fi) bắt buộc gõ đủ: https://<IP_MÁY_TÍNH>:8443  (có chữ https, không dùng http).
#    Nếu gặp "Bad Request / This combination of host and port requires TLS" → đang mở nhầm http://...
#    Trình duyệt báo chứng chỉ không tin cậy → Nâng cao / Tiếp tục (chỉ dev).
#.\mvnw.cmd spring-boot:run "-Dspring-boot.run.profiles=https-lan"
# Lắng nghe mọi card mạng (điện thoại vào bằng https://IP_máy:8443). Muốn chỉ một IP thì sửa lại.
server.address=26.69.167.77
server.port=${HTTPS_LAN_PORT:8443}
server.ssl.enabled=true
server.ssl.key-store=file:dev-lan.p12
server.ssl.key-store-password=${HTTPS_LAN_KEYSTORE_PASSWORD:devdev}
server.ssl.key-store-type=PKCS12
