<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companion Rental - Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #312e81 70%, #4c1d95 100%);
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        .portal-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
        }
        .portal-orb-1 {
            width: 400px; height: 400px;
            background: #8b5cf6;
            top: -100px; right: -100px;
        }
        .portal-orb-2 {
            width: 300px; height: 300px;
            background: #ec4899;
            bottom: -80px; left: -80px;
        }
        .portal-orb-3 {
            width: 250px; height: 250px;
            background: #3b82f6;
            bottom: 20%; right: 15%;
        }
        .portal-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 3.5rem 3rem;
            max-width: 720px;
            width: 100%;
            text-align: center;
            color: #fff;
            animation: fadeInUp 0.6s ease forwards;
        }
        .portal-card h1 {
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #c7d2fe 50%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .portal-card .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
        }
        .role-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            padding: 1.5rem 1.25rem;
            border-radius: 1.15rem;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
        }
        .role-btn:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.25);
            color: #fff;
        }
        .role-btn .role-icon {
            font-size: 2rem;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
        }
        .role-user { background: rgba(59, 130, 246, 0.15); }
        .role-user:hover { background: rgba(59, 130, 246, 0.2); box-shadow: 0 8px 30px rgba(59, 130, 246, 0.2); }
        .role-user .role-icon { background: linear-gradient(135deg, #3b82f6, #6366f1); }
        .role-companion { background: rgba(139, 92, 246, 0.15); }
        .role-companion:hover { background: rgba(139, 92, 246, 0.2); box-shadow: 0 8px 30px rgba(139, 92, 246, 0.2); }
        .role-companion .role-icon { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
        .role-admin { background: rgba(236, 72, 153, 0.15); }
        .role-admin:hover { background: rgba(236, 72, 153, 0.2); box-shadow: 0 8px 30px rgba(236, 72, 153, 0.2); }
        .role-admin .role-icon { background: linear-gradient(135deg, #ec4899, #f472b6); }
        .portal-footer {
            margin-top: 2.5rem;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.85rem;
        }
        .portal-footer a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: color 0.2s;
        }
        .portal-footer a:hover {
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
<div class="portal-orb portal-orb-1"></div>
<div class="portal-orb portal-orb-2"></div>
<div class="portal-orb portal-orb-3"></div>

<div class="portal-card">
    <h1><i class="bi bi-heart-pulse-fill"></i> Companion Rental</h1>
    <p class="subtitle">Nền tảng kết nối bạn đồng hành cho mọi hoạt động</p>
    <div class="row g-3">
        <div class="col-md-4">
            <a class="role-btn role-user" href="/user/index.html">
                <div class="role-icon"><i class="bi bi-person-fill"></i></div>
                <span>Khách hàng</span>
                <small style="color: rgba(255,255,255,0.5); font-weight: 400; font-size: 0.8rem;">Tìm & đặt lịch</small>
            </a>
        </div>
        <div class="col-md-4">
            <a class="role-btn role-companion" href="/companion/dashboard.html">
                <div class="role-icon"><i class="bi bi-stars"></i></div>
                <span>Companion</span>
                <small style="color: rgba(255,255,255,0.5); font-weight: 400; font-size: 0.8rem;">Quản lý dịch vụ</small>
            </a>
        </div>
        <div class="col-md-4">
            <a class="role-btn role-admin" href="/admin/dashboard.html">
                <div class="role-icon"><i class="bi bi-shield-lock-fill"></i></div>
                <span>Quản trị</span>
                <small style="color: rgba(255,255,255,0.5); font-weight: 400; font-size: 0.8rem;">Bảng điều khiển</small>
            </a>
        </div>
    </div>
    <div class="portal-footer">
        <a href="/policy.html">Chính sách & Điều khoản</a> &bull; &copy; 2026 Companion Rental
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
