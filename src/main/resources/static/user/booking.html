<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lịch - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="booking" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html"><i class="bi bi-heart-pulse-fill me-2"></i>Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4">
    <div class="card user-card mx-auto" style="max-width: 760px;">
        <div class="card-body p-4">
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle flex-shrink-0" style="width: 48px; height: 48px; background: linear-gradient(135deg, #3b82f6, #6366f1);">
                    <i class="bi bi-calendar-plus-fill text-white" style="font-size: 1.2rem;"></i>
                </div>
                <div>
                    <h1 class="h4 mb-0 fw-bold">Gửi yêu cầu đặt lịch</h1>
                    <p class="text-muted small mb-0">Chọn companion và thời gian phù hợp</p>
                </div>
            </div>
            <form id="booking-form" class="row g-3">
                <div class="col-md-6">
                    <label for="companionId" class="form-label"><i class="bi bi-person-heart me-1"></i>Companion</label>
                    <select id="companionId" class="form-select" required></select>
                </div>
                <div class="col-md-6">
                    <label for="bookingTime" class="form-label"><i class="bi bi-clock me-1"></i>Thời gian bắt đầu</label>
                    <input id="bookingTime" type="datetime-local" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label for="duration" class="form-label"><i class="bi bi-hourglass-split me-1"></i>Thời lượng (phút)</label>
                    <input id="duration" type="number" min="30" step="30" value="60" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label for="location" class="form-label"><i class="bi bi-geo-alt me-1"></i>Địa điểm</label>
                    <input id="location" type="text" class="form-control" placeholder="Quận 1, TP.HCM / Tên game room...">
                </div>
                <div class="col-12">
                    <label for="note" class="form-label"><i class="bi bi-chat-left-text me-1"></i>Ghi chú</label>
                    <textarea id="note" rows="3" class="form-control" placeholder="Thêm thông tin cần lưu ý"></textarea>
                </div>
                <div class="col-12 d-grid mt-2">
                    <button class="btn btn-primary btn-lg" type="submit"><i class="bi bi-check2-circle me-2"></i>Xác nhận đặt lịch</button>
                </div>
            </form>
            <div id="booking-message" class="mt-3"></div>
        </div>
    </div>
</main>
<script src="../js/user.js"></script>
</body>
</html>
