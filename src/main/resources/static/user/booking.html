<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lịch - User</title>
    <link rel="stylesheet" href="/css/user.css">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 600px; margin: 2rem auto;">
            <h1>Đặt lịch hẹn</h1>
            <form id="booking-form">
                <input type="hidden" id="companion-id">
                <div style="margin-top: 1.5rem;">
                    <label for="booking-date">Ngày và giờ hẹn</label>
                    <input type="datetime-local" id="booking-date" required>
                </div>
                <div>
                    <label for="duration">Thời lượng (phút)</label>
                    <input type="number" id="duration" min="30" step="30" value="60" required>
                </div>
                <button type="submit">Xác nhận đặt lịch</button>
            </form>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const companionId = urlParams.get('id');
            document.getElementById('companion-id').value = companionId;
            document.getElementById('booking-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const bookingData = {
                    companion: { id: companionId },
                    customer: { id: 1 },
                    bookingTime: document.getElementById('booking-date').value,
                    duration: document.getElementById('duration').value,
                    status: 'PENDING'
                };
                fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                }).then(() => {
                    window.location.href = '/user/appointments.html';
                });
            });
        });
    </script>
</body>
</html>
