<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User - Companion Rental</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <a href="/user/index.html" class="logo">Companion Rental</a>
        <nav>
            <a href="/search.html">Tim kiem</a>
            <a href="/companion/dashboard.html">Khu vuc Companion</a>
            <a href="/login">Dang nhap</a>
            <a href="/register">Dang ky</a>
            <a href="/policy.html">Chinh sach</a>
        </nav>
    </header>

    <div class="container">
        <section class="hero">
            <h1>Khu vuc User</h1>
            <p id="login-success-message" style="font-weight: bold; margin-bottom: 1rem;"></p>
            <p>Day la trang lam viec rieng cho nhom User.</p>
            <a href="/search.html" class="btn">Bat dau ngay</a>
        </section>

        <section>
            <h2 style="margin-bottom: 2rem; text-align: center;">Ban Dong Hanh Noi Bat</h2>
            <div id="companion-grid" class="grid">
                <div class="companion-card">
                    <div class="companion-img"></div>
                    <div class="companion-info">
                        <div class="companion-name">Dang tai...</div>
                        <div class="companion-bio">Vui long cho trong giay lat.</div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="/js/script.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const loginSuccessEl = document.getElementById('login-success-message');
        if (loginSuccessEl && params.get('loginSuccess') === '1') {
            const username = params.get('username') || 'ban';
            loginSuccessEl.textContent = `Dang nhap thanh cong. Xin chao ${username}!`;
        }
    </script>
</body>
</html>
