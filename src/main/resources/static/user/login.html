<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap User</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <h1>Dang nhap</h1>
    <p id="auth-message" style="max-width: 400px; margin: 0 auto 1rem; text-align: center; font-weight: bold;"></p>
    <form action="/login" method="post">
        <div>
            <label for="username">Ten nguoi dung:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div>
            <label for="password">Mat khau:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Dang nhap</button>
    </form>
    <script>
        const params = new URLSearchParams(window.location.search);
        const messageEl = document.getElementById('auth-message');
        if (messageEl) {
            if (params.get('registered') === '1') {
                messageEl.textContent = 'Dang ky thanh cong. Vui long dang nhap.';
                messageEl.style.color = 'green';
            } else if (params.get('error')) {
                messageEl.textContent = params.get('error');
                messageEl.style.color = 'red';
            }
        }
    </script>
</body>
</html>
