<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="login" class="bg-light">
<main class="container py-5">
    <div class="card auth-card mx-auto user-card">
        <div class="card-body p-4">
            <h1 class="h4 page-title mb-3">Dang nhap tai khoan</h1>
            <div id="auth-message" class="mb-3"></div>
            <form id="login-form" class="row g-3">
                <div class="col-12">
                    <label for="username" class="form-label">Ten dang nhap</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>
                <div class="col-12">
                    <label for="password" class="form-label">Mat khau</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="col-12 d-grid">
                    <button type="submit" class="btn btn-primary">Dang nhap</button>
                </div>
            </form>
            <p class="mt-3 mb-0 text-muted">Chua co tai khoan? <a href="/user/register.html">Dang ky ngay</a></p>
        </div>
    </div>
</main>
<script src="../js/user.js"></script>
</body>
</html>
