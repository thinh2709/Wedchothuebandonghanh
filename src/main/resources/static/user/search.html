<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="search" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html">Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4">
    <h1 class="h3 mb-3 page-title">Tìm kiếm bạn đồng hành</h1>
    <form id="search-form" class="row g-2 mb-3">
        <div class="col-md-4">
            <input id="keyword" class="form-control" placeholder="Từ khóa">
        </div>
        <div class="col-md-2">
            <select id="serviceType" class="form-select">
                <option value="">Dịch vụ</option>
                <option value="GAME">Game</option>
                <option value="OUTING">Outing</option>
            </select>
        </div>
        <div class="col-md-2">
            <input id="area" class="form-control" placeholder="Khu vực">
        </div>
        <div class="col-md-2">
            <input id="gameRank" class="form-control" placeholder="Rank">
        </div>
        <div class="col-md-2">
            <select id="gender" class="form-select">
                <option value="">Giới tính</option>
                <option value="MALE">Nam</option>
                <option value="FEMALE">Nữ</option>
            </select>
        </div>
        <div class="col-md-2">
            <input id="minPrice" type="number" min="0" class="form-control" placeholder="Giá từ">
        </div>
        <div class="col-md-2">
            <input id="maxPrice" type="number" min="0" class="form-control" placeholder="Giá đến">
        </div>
        <div class="col-md-2">
            <select id="online" class="form-select">
                <option value="">Online?</option>
                <option value="true">Đang online</option>
                <option value="false">Đang offline</option>
            </select>
        </div>
        <div class="col-md-2 d-grid">
            <button class="btn btn-primary" type="submit">Lọc kết quả</button>
        </div>
    </form>
    <div id="companion-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"></div>
</main>
<script src="../js/user.js"></script>
</body>
</html>
