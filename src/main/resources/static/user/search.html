<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="search" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html"><i class="bi bi-heart-pulse-fill me-2"></i>Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4">
    <h1 class="h3 mb-4 page-title"><i class="bi bi-search ms-3 me-1"></i> Tìm kiếm bạn đồng hành</h1>

    <div class="card user-card mb-4">
        <div class="card-body p-3 p-md-4">
            <form id="search-form" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small fw-semibold text-muted"><i class="bi bi-type me-1"></i>Từ khóa</label>
                    <input id="keyword" class="form-control" placeholder="Tên, sở thích...">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted"><i class="bi bi-grid me-1"></i>Dịch vụ</label>
                    <select id="serviceType" class="form-select">
                        <option value="">Tất cả</option>
                        <option value="GAME">Game</option>
                        <option value="OUTING">Outing</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted"><i class="bi bi-geo-alt me-1"></i>Khu vực</label>
                    <input id="area" class="form-control" placeholder="Khu vực">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted"><i class="bi bi-trophy me-1"></i>Rank</label>
                    <input id="gameRank" class="form-control" placeholder="Rank game">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted"><i class="bi bi-gender-ambiguous me-1"></i>Giới tính</label>
                    <select id="gender" class="form-select">
                        <option value="">Tất cả</option>
                        <option value="MALE">Nam</option>
                        <option value="FEMALE">Nữ</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted"><i class="bi bi-cash me-1"></i>Giá từ</label>
                    <input id="minPrice" type="number" min="0" class="form-control" placeholder="VND">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted"><i class="bi bi-cash-stack me-1"></i>Giá đến</label>
                    <input id="maxPrice" type="number" min="0" class="form-control" placeholder="VND">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold text-muted"><i class="bi bi-circle-fill me-1" style="font-size:0.5rem;color:#10b981;"></i>Online?</label>
                    <select id="online" class="form-select">
                        <option value="">Tất cả</option>
                        <option value="true">Đang online</option>
                        <option value="false">Đang offline</option>
                    </select>
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-funnel me-1"></i>Lọc</button>
                </div>
            </form>
        </div>
    </div>

    <div id="companion-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"></div>
</main>
<script src="../js/realtime-stomp.js"></script>
<script src="../js/user.js"></script>
</body>
</html>
