<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat/Call - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
    <style>
        #chat-list { background: linear-gradient(135deg, #f8fafc, #f1f5f9); }
        #chat-thread-list .list-group-item-action { border-radius: 0; transition: all 0.15s ease; }
        #chat-thread-list .list-group-item-action:hover { background: linear-gradient(135deg, #eff6ff, #eef2ff); }
        #chat-thread-list .list-group-item-action.bg-light { background: linear-gradient(135deg, #eff6ff, #eef2ff) !important; border-left: 3px solid #3b82f6; }
        #live-map-canvas { min-height: 220px; z-index: 1; }
    </style>
</head>
<body data-page="chat" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html"><i class="bi bi-heart-pulse-fill me-2"></i>Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4">
    <div class="card user-card">
        <div class="card-body p-4">
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle flex-shrink-0" style="width: 48px; height: 48px; background: linear-gradient(135deg, #3b82f6, #6366f1);">
                    <i class="bi bi-chat-dots-fill text-white" style="font-size: 1.2rem;"></i>
                </div>
                <h1 class="h4 mb-0 fw-bold">Tin nhắn</h1>
            </div>
            <div class="row g-3">
                <div class="col-lg-4">
                    <div class="border rounded-3 bg-white overflow-hidden">
                        <div class="p-3 border-bottom fw-semibold bg-light"><i class="bi bi-chat-left-text me-2"></i>Danh sách trò chuyện</div>
                        <div id="chat-thread-list" style="max-height: 420px; overflow: auto;"></div>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <div>
                            <div class="fw-semibold" id="chat-thread-title">Chưa chọn cuộc trò chuyện</div>
                            <div class="text-muted small">Booking ID: <span id="chat-booking-id-text">-</span></div>
                        </div>
                        <button id="call-btn" class="btn btn-outline-success btn-sm"><i class="bi bi-telephone-fill me-1"></i>Lấy thông tin Call</button>
                    </div>
                    <div id="call-info" class="mb-3"></div>
                    <div id="live-location-panel" class="border rounded-3 p-3 mb-3 bg-white small">
                        <div class="fw-semibold mb-2 text-primary"><i class="bi bi-broadcast-pin me-1"></i>Vị trí realtime</div>
                        <div id="live-location-details" class="text-muted">Chọn cuộc trò chuyện có đơn đang nhận hoặc đang diễn ra để xem vị trí đối phương.</div>
                        <div id="live-map-wrap" class="mt-2" style="display:none">
                            <div id="live-map-canvas" class="rounded border bg-light" style="height:240px;width:100%"></div>
                        </div>
                    </div>
                    <div id="chat-list" class="border rounded-3 p-3 mb-3" style="height: 340px; overflow: auto;"></div>
                    <form id="chat-form" class="input-group">
                        <input id="chat-content" class="form-control" placeholder="Nhập tin nhắn...">
                        <button class="btn btn-primary" type="submit"><i class="bi bi-send-fill me-1"></i>Gửi</button>
                    </form>
                </div>
            </div>
            <div id="chat-message" class="mt-3"></div>
        </div>
    </div>
</main>
<script src="../js/realtime-stomp.js"></script>
<script src="../js/user.js"></script>
</body>
</html>
