<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat/Call nội bộ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="chat" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html">Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4">
    <div class="card user-card">
        <div class="card-body">
            <h1 class="h4 mb-3">Chat nội bộ theo booking</h1>
            <div class="input-group mb-3">
                <span class="input-group-text">Booking ID</span>
                <input type="number" class="form-control" id="chat-booking-id" min="1">
                <button id="load-chat-btn" class="btn btn-outline-primary">Tải chat</button>
                <button id="call-btn" class="btn btn-outline-success">Lấy thông tin Call</button>
            </div>
            <div id="call-info" class="mb-3"></div>
            <div id="chat-list" class="border rounded p-3 bg-white mb-3" style="height: 340px; overflow: auto;"></div>
            <form id="chat-form" class="input-group">
                <input id="chat-content" class="form-control" placeholder="Nhập tin nhắn...">
                <button class="btn btn-primary" type="submit">Gửi</button>
            </form>
            <div id="chat-message" class="mt-3"></div>
        </div>
    </div>
</main>
<script src="../js/user.js"></script>
</body>
</html>
