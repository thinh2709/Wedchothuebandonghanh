<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="register" class="bg-light">
<main class="container py-5 d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card auth-card mx-auto user-card w-100">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 56px; height: 56px; background: linear-gradient(135deg, #10b981, #059669);">
                    <i class="bi bi-person-plus-fill text-white" style="font-size: 1.5rem;"></i>
                </div>
                <h1 class="h4 fw-bold mb-1">Tạo tài khoản mới</h1>
                <p class="text-muted small">Đăng ký miễn phí để bắt đầu sử dụng</p>
            </div>
            <div id="auth-message" class="mb-3"></div>
            <form id="register-form" class="row g-3">
                <div class="col-12">
                    <label for="username" class="form-label"><i class="bi bi-person me-1"></i>Tên đăng nhập</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Chọn tên đăng nhập" required>
                </div>
                <div class="col-12">
                    <label for="password" class="form-label"><i class="bi bi-lock me-1"></i>Mật khẩu</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Tạo mật khẩu" required>
                </div>
                <div class="col-12">
                    <label for="email" class="form-label"><i class="bi bi-envelope me-1"></i>Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="email@example.com" required>
                </div>
                <div class="col-12 d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg"><i class="bi bi-check-circle me-2"></i>Đăng ký</button>
                </div>
            </form>
            <p class="mt-4 mb-0 text-muted text-center">Đã có tài khoản? <a href="/user/login.html" class="fw-semibold text-decoration-none">Đăng nhập ngay</a></p>
        </div>
    </div>
</main>
<script src="../js/realtime-stomp.js"></script>
<script src="../js/user.js"></script>
</body>
</html>
