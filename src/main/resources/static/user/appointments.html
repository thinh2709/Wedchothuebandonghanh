<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch hẹn - User</title>
    <link rel="stylesheet" href="/css/user.css">
</head>
<body>
    <div class="container">
        <h1>Lịch hẹn của bạn</h1>
        <div id="booking-list"><p>Đang tải danh sách lịch hẹn...</p></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookingList = document.getElementById('booking-list');
            fetch('/api/bookings/customer/1')
                .then(response => response.json())
                .then(bookings => {
                    bookingList.innerHTML = '';
                    if (!bookings.length) {
                        bookingList.innerHTML = '<p>Bạn chưa có lịch hẹn nào.</p>';
                        return;
                    }
                    bookings.forEach(booking => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `<h3>${booking.companion.user.fullName || booking.companion.user.username}</h3><p>${booking.status}</p>`;
                        bookingList.appendChild(card);
                    });
                });
        });
    </script>
</body>
</html>
