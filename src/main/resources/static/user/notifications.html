<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
    <style>
        .notif-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }
        .notif-item:hover {
            background: linear-gradient(135deg, #eff6ff, #eef2ff);
        }
        .notif-item.unread {
            background: linear-gradient(135deg, #eff6ff, #f5f3ff);
            border-left: 4px solid #3b82f6;
        }
        .notif-item.unread .notif-title {
            font-weight: 700;
        }
        .notif-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3b82f6;
            display: inline-block;
            flex-shrink: 0;
        }
        .notif-time {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .notif-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.1rem;
        }
        .notif-count-badge {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.35em 0.85em;
            border-radius: 100px;
        }
    </style>
</head>
<body data-page="notifications" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html"><i class="bi bi-heart-pulse-fill me-2"></i>Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 page-title"><i class="bi bi-bell-fill ms-3 me-1"></i> Thông báo</h1>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <span id="unread-count" class="notif-count-badge">0 chưa đọc</span>
            <button id="mark-all-read-btn" class="btn btn-outline-primary btn-sm">
                <i class="bi bi-check2-all me-1"></i>Đọc tất cả
            </button>
        </div>
    </div>

    <div class="card user-card overflow-hidden">
        <div id="notification-list">
            <div class="text-center py-5">
                <div class="spinner-border text-primary mb-3" role="status"></div>
                <p class="text-muted mb-0">Đang tải thông báo...</p>
            </div>
        </div>
    </div>
</main>
<script src="../js/user.js"></script>
</body>
</html>
