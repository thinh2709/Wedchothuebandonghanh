<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vi tien - User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="wallet" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html">Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4">
    <div class="row g-3">
        <div class="col-lg-4">
            <div class="card user-card">
                <div class="card-body">
                    <h1 class="h4 mb-2">So du vi</h1>
                    <div id="wallet-balance" class="display-6 text-primary fw-bold">0 VND</div>
                    <hr>
                    <form id="deposit-form" class="row g-2">
                        <div class="col-12">
                            <label class="form-label" for="depositAmount">So tien nap</label>
                            <input id="depositAmount" class="form-control" type="number" min="1000" step="1000" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="provider">Kenh nap</label>
                            <select id="provider" class="form-select">
                                <option value="MOMO">MoMo</option>
                                <option value="VNPAY">VNPay</option>
                                <option value="BANK_TRANSFER">Chuyen khoan</option>
                            </select>
                        </div>
                        <div class="col-12 d-grid">
                            <button class="btn btn-primary" type="submit">Nap tien</button>
                        </div>
                    </form>
                    <div id="wallet-message" class="mt-3"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card user-card">
                <div class="card-body">
                    <h2 class="h5 mb-3">Lich su giao dich</h2>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle">
                            <thead>
                            <tr>
                                <th>Thoi gian</th>
                                <th>Loai</th>
                                <th>Kenh</th>
                                <th>Noi dung</th>
                                <th>So tien</th>
                            </tr>
                            </thead>
                            <tbody id="wallet-transactions"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="../js/user.js"></script>
</body>
</html>
