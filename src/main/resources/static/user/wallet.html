<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ví tiền - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="wallet" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html"><i class="bi bi-heart-pulse-fill me-2"></i>Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4">
    <div class="row g-3">
        <div class="col-lg-4">
            <div class="card user-card">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle flex-shrink-0" style="width: 48px; height: 48px; background: linear-gradient(135deg, #10b981, #059669);">
                            <i class="bi bi-wallet2 text-white" style="font-size: 1.2rem;"></i>
                        </div>
                        <div>
                            <h1 class="h5 mb-0 fw-bold">Số dư ví</h1>
                            <div id="wallet-balance" class="h4 text-primary fw-bold mb-0">0 VND</div>
                        </div>
                    </div>
                    <hr>
                    <h6 class="fw-bold mb-3"><i class="bi bi-plus-circle me-1"></i>Nạp tiền</h6>
                    <form id="deposit-form" class="row g-2">
                        <div class="col-12">
                            <label class="form-label" for="depositAmount">Số tiền nạp</label>
                            <input id="depositAmount" class="form-control" type="number" min="1000" step="500" placeholder="Nhập số tiền" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="provider">Kênh nạp</label>
                            <select id="provider" class="form-select">
                                <option value="MOMO">MoMo</option>
                                <option value="VNPAY">VNPay</option>
                                <option value="BANK_TRANSFER">Chuyển khoản</option>
                            </select>
                        </div>
                        <div class="col-12 d-grid mt-2">
                            <button class="btn btn-primary" type="submit"><i class="bi bi-cash-coin me-1"></i>Nạp tiền</button>
                        </div>
                    </form>
                    <div id="wallet-message" class="mt-3"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="card user-card">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3 fw-bold"><i class="bi bi-clock-history me-2"></i>Lịch sử giao dịch</h2>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle">
                            <thead>
                            <tr>
                                <th>Thời gian</th>
                                <th>Loại</th>
                                <th>Kênh</th>
                                <th>Nội dung</th>
                                <th>Số tiền</th>
                            </tr>
                            </thead>
                            <tbody id="wallet-transactions"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="../js/realtime-stomp.js"></script>
<script src="../js/user.js"></script>
</body>
</html>
