<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tố cáo - User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="report" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html">Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4">
    <div class="row g-3">
        <div class="col-lg-6">
            <div class="card user-card">
                <div class="card-body">
                    <h1 class="h4 mb-3">Gửi tố cáo / khiếu nại</h1>
                    <form id="report-form" class="row g-3">
                        <div class="col-12">
                            <label for="reportedUserId" class="form-label">ID user bị tố cáo</label>
                            <input id="reportedUserId" type="number" min="1" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label for="reportCategory" class="form-label">Loại vấn đề</label>
                            <select id="reportCategory" class="form-select">
                                <option value="FAKE_PROFILE">Không giống ảnh</option>
                                <option value="LATE">Đi trễ</option>
                                <option value="HARASSMENT">Quấy rối</option>
                                <option value="BAD_ATTITUDE">Thái độ không tốt</option>
                                <option value="OTHER">Khác</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label for="reason" class="form-label">Nội dung</label>
                            <textarea id="reason" rows="4" class="form-control" placeholder="Mô tả chi tiết sự việc..." required></textarea>
                        </div>
                        <div class="col-12 form-check ms-2">
                            <input id="isEmergency" class="form-check-input" type="checkbox">
                            <label class="form-check-label" for="isEmergency">SOS khẩn cấp</label>
                        </div>
                        <div class="col-12 d-grid">
                            <button class="btn btn-warning" type="submit">Gửi tố cáo</button>
                        </div>
                    </form>
                    <div id="report-message" class="mt-3"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card user-card">
                <div class="card-body">
                    <h2 class="h5 mb-3">Lịch sử tố cáo của bạn</h2>
                    <div id="report-list"><p class="text-muted mb-0">Đang tải dữ liệu...</p></div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="../js/user.js"></script>
</body>
</html>
