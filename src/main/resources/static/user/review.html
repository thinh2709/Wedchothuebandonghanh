<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đánh giá - User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="review" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html">Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4">
    <div class="row g-3">
        <div class="col-lg-6">
            <div class="card user-card">
                <div class="card-body">
                    <h1 class="h4 mb-3">Gửi đánh giá</h1>
                    <form id="review-form" class="row g-3">
                        <div class="col-12">
                            <label for="bookingId" class="form-label">Lịch hẹn đã hoàn thành</label>
                            <select id="bookingId" class="form-select"></select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Số sao</label>
                            <div id="rating-stars">
                                <button class="star-btn" type="button" data-value="1">★</button>
                                <button class="star-btn" type="button" data-value="2">★</button>
                                <button class="star-btn" type="button" data-value="3">★</button>
                                <button class="star-btn" type="button" data-value="4">★</button>
                                <button class="star-btn" type="button" data-value="5">★</button>
                            </div>
                        </div>
                        <div class="col-12">
                            <label for="comment" class="form-label">Nhận xét</label>
                            <textarea id="comment" class="form-control" rows="4" placeholder="Trải nghiệm của bạn với companion..."></textarea>
                        </div>
                        <div class="col-12 d-grid">
                            <button class="btn btn-primary" type="submit">Gửi đánh giá</button>
                        </div>
                    </form>
                    <div id="review-message" class="mt-3"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card user-card">
                <div class="card-body">
                    <h2 class="h5 mb-3">Đánh giá của bạn</h2>
                    <div id="review-list"><p class="text-muted mb-0">Đang tải dữ liệu...</p></div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="../js/user.js"></script>
</body>
</html>
