<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đánh giá - Companion Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/user.css">
</head>
<body data-page="review" class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/index.html"><i class="bi bi-heart-pulse-fill me-2"></i>Companion Rental</a>
        <div id="top-nav" class="app-nav d-flex align-items-center flex-wrap gap-1"></div>
    </div>
</nav>
<main class="container py-4">
    <div class="row g-3">
        <div class="col-lg-6">
            <div class="card user-card">
                <div class="card-body p-4">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center rounded-circle flex-shrink-0" style="width: 48px; height: 48px; background: linear-gradient(135deg, #f59e0b, #f97316);">
                            <i class="bi bi-star-fill text-white" style="font-size: 1.2rem;"></i>
                        </div>
                        <div>
                            <h1 class="h4 mb-0 fw-bold">Gửi đánh giá</h1>
                            <p class="text-muted small mb-0">Chia sẻ trải nghiệm của bạn</p>
                        </div>
                    </div>
                    <form id="review-form" class="row g-3">
                        <div class="col-12">
                            <label for="bookingId" class="form-label"><i class="bi bi-calendar-check me-1"></i>Lịch hẹn đã hoàn thành</label>
                            <select id="bookingId" class="form-select"></select>
                        </div>
                        <div class="col-12">
                            <label class="form-label"><i class="bi bi-stars me-1"></i>Số sao</label>
                            <div id="rating-stars" class="d-flex gap-1">
                                <button class="star-btn" type="button" data-value="1">★</button>
                                <button class="star-btn" type="button" data-value="2">★</button>
                                <button class="star-btn" type="button" data-value="3">★</button>
                                <button class="star-btn" type="button" data-value="4">★</button>
                                <button class="star-btn" type="button" data-value="5">★</button>
                            </div>
                        </div>
                        <div class="col-12">
                            <label for="comment" class="form-label"><i class="bi bi-chat-quote me-1"></i>Nhận xét</label>
                            <textarea id="comment" class="form-control" rows="4" placeholder="Trải nghiệm của bạn với companion..."></textarea>
                        </div>
                        <div class="col-12 d-grid">
                            <button class="btn btn-primary" type="submit"><i class="bi bi-send me-1"></i>Gửi đánh giá</button>
                        </div>
                    </form>
                    <div id="review-message" class="mt-3"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card user-card">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3 fw-bold"><i class="bi bi-journal-text me-2"></i>Đánh giá của bạn</h2>
                    <div id="review-list">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary mb-3" role="status"></div>
                            <p class="text-muted mb-0">Đang tải dữ liệu...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="../js/user.js"></script>
</body>
</html>
