<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Companion - Tài chính</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/companion.css">
</head>
<body class="bg-light" data-page="companion-finance">
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/companion/dashboard.html"><i class="bi bi-stars me-2"></i>Companion Center</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#companionNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="companionNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/companion/dashboard.html"><i class="bi bi-grid-1x2 me-1"></i>Tổng quan</a>
                <a class="nav-link" href="/companion/profile.html"><i class="bi bi-person-circle me-1"></i>Hồ sơ</a>
                <a class="nav-link" href="/companion/operations.html"><i class="bi bi-calendar-range me-1"></i>Lịch & Dịch vụ</a>
                <a class="nav-link" href="/companion/bookings.html"><i class="bi bi-bag-check me-1"></i>Đơn hàng</a>
                <a class="nav-link active" href="/companion/finance.html"><i class="bi bi-currency-dollar me-1"></i>Tài chính</a>
                <a class="nav-link" href="/companion/notifications.html"><i class="bi bi-bell me-1"></i>Thông báo</a>
                <a class="nav-link text-warning" href="#" id="logout-btn"><i class="bi bi-box-arrow-right me-1"></i>Đăng xuất</a>
            </div>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1 fw-bold"><i class="bi bi-currency-dollar me-2"></i>Tài chính</h1>
            <p class="text-muted mb-0">Theo dõi thu nhập và rút tiền</p>
        </div>
        <span id="auth-user" class="badge text-bg-primary"></span>
    </div>
    <div id="alert-box"></div>

    <section class="card shadow-sm mb-4">
        <div class="card-body p-4">
            <h2 class="h5"><i class="bi bi-graph-up-arrow ms-3 me-2"></i>Thống kê thu nhập</h2>
            <div class="row g-3 mt-1">
                <div class="col-md-4"><div class="p-3 border rounded text-center"><div class="text-muted small">Tổng thu nhập đã đối soát</div><div class="h5 mb-0" id="stat-income">0</div></div></div>
                <div class="col-md-4"><div class="p-3 border rounded text-center"><div class="text-muted small">Số dư khả dụng</div><div class="h5 mb-0" id="stat-available">0</div></div></div>
                <div class="col-md-4"><div class="p-3 border rounded text-center"><div class="text-muted small">Tiền đang hold</div><div class="h5 mb-0" id="stat-hold">0</div></div></div>
                <div class="col-md-4"><div class="p-3 border rounded text-center"><div class="text-muted small">Booking đã chấp nhận</div><div class="h5 mb-0" id="stat-accepted">0</div></div></div>
                <div class="col-md-4"><div class="p-3 border rounded text-center"><div class="text-muted small">Booking hoàn tất</div><div class="h5 mb-0" id="stat-completed">0</div></div></div>
            </div>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body p-4">
            <h2 class="h5"><i class="bi bi-bank ms-3 me-2"></i>Rút tiền</h2>
            <form id="withdraw-form" class="row g-3 mt-2">
                <div class="col-md-3">
                    <label for="withdraw-amount" class="form-label"><i class="bi bi-cash-coin me-1"></i>Số tiền</label>
                    <input id="withdraw-amount" type="number" min="1" class="form-control" placeholder="VND" required>
                </div>
                <div class="col-md-3">
                    <label for="bank-name" class="form-label"><i class="bi bi-bank2 me-1"></i>Ngân hàng</label>
                    <input id="bank-name" class="form-control" placeholder="Tên ngân hàng" required>
                </div>
                <div class="col-md-3">
                    <label for="bank-account-number" class="form-label"><i class="bi bi-credit-card me-1"></i>Số tài khoản</label>
                    <input id="bank-account-number" class="form-control" placeholder="Số TK" required>
                </div>
                <div class="col-md-3">
                    <label for="account-holder-name" class="form-label"><i class="bi bi-person me-1"></i>Chủ tài khoản</label>
                    <input id="account-holder-name" class="form-control" placeholder="Tên chủ TK" required>
                </div>
                <div class="col-12">
                    <button class="btn btn-outline-success btn-lg" type="submit"><i class="bi bi-arrow-down-circle me-2"></i>Tạo lệnh rút tiền</button>
                </div>
            </form>
            <div class="table-responsive mt-4">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr><th>Ngày tạo</th><th>Số tiền</th><th>Ngân hàng</th><th>Trạng thái</th></tr>
                    </thead>
                    <tbody id="withdrawal-body"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/companion.js"></script>
</body>
</html>
