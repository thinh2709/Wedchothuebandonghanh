<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Companion - Tài chính</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/companion.css">
</head>
<body class="bg-light" data-page="companion-finance">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/companion/dashboard.html">Companion Center</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/companion/dashboard.html">Tổng quan</a>
            <a class="nav-link" href="/companion/profile.html">Hồ sơ</a>
            <a class="nav-link" href="/companion/operations.html">Lịch & Dịch vụ</a>
            <a class="nav-link" href="/companion/bookings.html">Đơn hàng</a>
            <a class="nav-link active" href="/companion/finance.html">Tài chính</a>
            <a class="nav-link text-warning" href="#" id="logout-btn">Đăng xuất</a>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Tài chính</h1>
        <span id="auth-user" class="badge text-bg-primary"></span>
    </div>
    <div id="alert-box"></div>

    <section class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h5">Thống kê thu nhập</h2>
            <div class="row g-3 mt-1">
                <div class="col-md-4"><div class="p-3 border rounded"><div class="text-muted small">Tổng thu nhập đã đối soát</div><div class="h5 mb-0" id="stat-income">0</div></div></div>
                <div class="col-md-4"><div class="p-3 border rounded"><div class="text-muted small">Số dư khả dụng</div><div class="h5 mb-0" id="stat-available">0</div></div></div>
                <div class="col-md-4"><div class="p-3 border rounded"><div class="text-muted small">Tiền đang hold</div><div class="h5 mb-0" id="stat-hold">0</div></div></div>
                <div class="col-md-4"><div class="p-3 border rounded"><div class="text-muted small">Booking đã chấp nhận</div><div class="h5 mb-0" id="stat-accepted">0</div></div></div>
                <div class="col-md-4"><div class="p-3 border rounded"><div class="text-muted small">Booking hoàn tất</div><div class="h5 mb-0" id="stat-completed">0</div></div></div>
            </div>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5">Rút tiền</h2>
            <form id="withdraw-form" class="row g-3 mt-1">
                <div class="col-md-3">
                    <label for="withdraw-amount" class="form-label">Số tiền</label>
                    <input id="withdraw-amount" type="number" min="1" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label for="bank-name" class="form-label">Ngân hàng</label>
                    <input id="bank-name" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label for="bank-account-number" class="form-label">Số tài khoản</label>
                    <input id="bank-account-number" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label for="account-holder-name" class="form-label">Chủ tài khoản</label>
                    <input id="account-holder-name" class="form-control" required>
                </div>
                <div class="col-12">
                    <button class="btn btn-outline-success" type="submit">Tạo lệnh rút tiền</button>
                </div>
            </form>
            <div class="table-responsive mt-3">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr><th>Ngày tạo</th><th>Số tiền</th><th>Ngân hàng</th><th>Trạng thái</th></tr>
                    </thead>
                    <tbody id="withdrawal-body"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/companion.js"></script>
</body>
</html>
