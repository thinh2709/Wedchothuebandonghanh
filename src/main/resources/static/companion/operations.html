<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Companion - Lịch & Dịch vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/companion.css">
</head>
<body class="bg-light" data-page="companion-operations">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/companion/dashboard.html">Companion Center</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/companion/dashboard.html">Tổng quan</a>
            <a class="nav-link" href="/companion/profile.html">Hồ sơ</a>
            <a class="nav-link active" href="/companion/operations.html">Lịch & Dịch vụ</a>
            <a class="nav-link" href="/companion/bookings.html">Đơn hàng</a>
            <a class="nav-link" href="/companion/finance.html">Tài chính</a>
            <a class="nav-link text-warning" href="#" id="logout-btn">Đăng xuất</a>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Lịch & Dịch vụ</h1>
        <span id="auth-user" class="badge text-bg-primary"></span>
    </div>
    <div id="alert-box"></div>

    <section class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h5">Lịch rảnh chi tiết</h2>
            <form id="availability-form" class="row g-3 mt-1">
                <div class="col-md-4">
                    <label for="start-time" class="form-label">Bắt đầu</label>
                    <input id="start-time" type="datetime-local" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label for="end-time" class="form-label">Kết thúc</label>
                    <input id="end-time" type="datetime-local" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label for="note" class="form-label">Ghi chú</label>
                    <input id="note" class="form-control">
                </div>
                <div class="col-12">
                    <button class="btn btn-success" type="submit">Thêm khung giờ</button>
                </div>
            </form>
            <div class="table-responsive mt-3">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr><th>Bắt đầu</th><th>Kết thúc</th><th>Ghi chú</th><th></th></tr>
                    </thead>
                    <tbody id="availability-body"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5">Bảng giá dịch vụ</h2>
            <form id="service-price-form" class="row g-3 mt-1">
                <div class="col-md-4">
                    <label for="service-name" class="form-label">Tên dịch vụ</label>
                    <input id="service-name" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label for="service-price" class="form-label">Giá/giờ</label>
                    <input id="service-price" type="number" min="1" class="form-control" required>
                </div>
                <div class="col-md-5">
                    <label for="service-description" class="form-label">Mô tả</label>
                    <input id="service-description" class="form-control">
                </div>
                <div class="col-12">
                    <button class="btn btn-outline-primary" type="submit">Thêm bảng giá</button>
                </div>
            </form>
            <div class="table-responsive mt-3">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr><th>Dịch vụ</th><th>Giá/giờ</th><th>Mô tả</th><th></th></tr>
                    </thead>
                    <tbody id="service-price-body"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/companion.js"></script>
</body>
</html>
