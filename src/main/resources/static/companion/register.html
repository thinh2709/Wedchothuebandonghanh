<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/companion.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/user/index.html">Companion Rental</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/user/search.html">Tìm kiếm</a>
            <a class="nav-link" href="/policy.html">Chính sách</a>
            <a class="nav-link" href="/companion/dashboard.html">Dashboard Companion</a>
            <a class="nav-link text-warning" href="#" id="logout-btn">Đăng xuất</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Đăng ký Companion</h1>
        <span id="auth-user" class="badge text-bg-primary"></span>
    </div>
    <div id="alert-box"></div>

    <section class="card shadow-sm">
        <div class="card-body">
            <p class="text-muted">Hoàn tất thông tin hồ sơ để gửi yêu cầu duyệt Companion.</p>
            <form id="register-form" class="row g-3 mt-1">
                <div class="col-12">
                    <label for="bio" class="form-label">Tiểu sử</label>
                    <textarea id="bio" class="form-control" rows="3" required></textarea>
                </div>
                <div class="col-md-6">
                    <label for="hobbies" class="form-label">Sở thích</label>
                    <input id="hobbies" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label for="appearance" class="form-label">Ngoại hình</label>
                    <input id="appearance" class="form-control" required>
                </div>
                <div class="col-12">
                    <label for="availability" class="form-label">Thông tin lịch rảnh tổng quan</label>
                    <input id="availability" class="form-control" placeholder="VD: Tối 2-6, 18:00 - 22:00">
                </div>
                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Gửi đăng ký</button>
                </div>
            </form>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/companion-register.js"></script>
</body>
</html>
