<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Companion - Hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/companion.css">
</head>
<body class="bg-light" data-page="companion-profile">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/companion/dashboard.html">Companion Center</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/companion/dashboard.html">Tổng quan</a>
            <a class="nav-link active" href="/companion/profile.html">Hồ sơ</a>
            <a class="nav-link" href="/companion/operations.html">Lịch & Dịch vụ</a>
            <a class="nav-link" href="/companion/bookings.html">Đơn hàng</a>
            <a class="nav-link" href="/companion/finance.html">Tài chính</a>
            <a class="nav-link text-warning" href="#" id="logout-btn">Đăng xuất</a>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Hồ sơ Companion</h1>
        <span id="auth-user" class="badge text-bg-primary"></span>
    </div>
    <div id="alert-box"></div>

    <section class="card shadow-sm mb-4">
        <div class="card-body">
            <h2 class="h5">Thông tin cá nhân</h2>
            <form id="profile-form" class="row g-3 mt-1">
                <div class="col-12">
                    <label for="bio" class="form-label">Tiểu sử</label>
                    <textarea id="bio" class="form-control" rows="3" required></textarea>
                </div>
                <div class="col-md-6">
                    <label for="hobbies" class="form-label">Sở thích</label>
                    <input id="hobbies" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label for="appearance" class="form-label">Ngoại hình</label>
                    <input id="appearance" class="form-control" required>
                </div>
                <div class="col-12">
                    <label for="availability-text" class="form-label">Thông tin lịch rảnh tổng quan</label>
                    <input id="availability-text" class="form-control" placeholder="VD: Tối 2-6, 18:00 - 22:00">
                </div>
                <div class="col-md-4">
                    <label for="identity-number" class="form-label">Số CCCD/CMND</label>
                    <input id="identity-number" class="form-control">
                </div>
                <div class="col-md-4">
                    <label for="identity-image-url" class="form-label">URL CCCD/CMND</label>
                    <input id="identity-image-url" class="form-control">
                </div>
                <div class="col-md-4">
                    <label for="portrait-image-url" class="form-label">URL ảnh chân dung</label>
                    <input id="portrait-image-url" class="form-control">
                </div>
                <div class="col-md-6">
                    <label for="intro-media-urls" class="form-label">Album ảnh/video (cách nhau dấu phẩy)</label>
                    <textarea id="intro-media-urls" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-md-6">
                    <label for="skills" class="form-label">Kỹ năng / Dịch vụ cung cấp</label>
                    <textarea id="skills" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Trạng thái hồ sơ</label>
                    <div><span id="companion-status" class="badge text-bg-secondary">N/A</span></div>
                </div>
                <div class="col-md-6 form-check form-switch pt-4">
                    <input class="form-check-input" type="checkbox" id="online-toggle">
                    <label class="form-check-label" for="online-toggle">Bật trạng thái Online</label>
                </div>
                <div class="col-12">
                    <button class="btn btn-primary" type="submit">Lưu hồ sơ</button>
                </div>
            </form>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/companion.js"></script>
</body>
</html>
