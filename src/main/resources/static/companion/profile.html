<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Companion - Hồ sơ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/companion.css">
</head>
<body class="bg-light" data-page="companion-profile">
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/companion/dashboard.html"><i class="bi bi-stars me-2"></i>Companion Center</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#companionNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="companionNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/companion/dashboard.html"><i class="bi bi-grid-1x2 me-1"></i>Tổng quan</a>
                <a class="nav-link active" href="/companion/profile.html"><i class="bi bi-person-circle me-1"></i>Hồ sơ</a>
                <a class="nav-link" href="/companion/operations.html"><i class="bi bi-calendar-range me-1"></i>Lịch & Dịch vụ</a>
                <a class="nav-link" href="/companion/bookings.html"><i class="bi bi-bag-check me-1"></i>Đơn hàng</a>
                <a class="nav-link" href="/companion/finance.html"><i class="bi bi-currency-dollar me-1"></i>Tài chính</a>
                <a class="nav-link" href="/companion/chat.html"><i class="bi bi-chat-dots me-1"></i>Chat/Call</a>
                <a class="nav-link" href="/companion/notifications.html"><i class="bi bi-bell me-1"></i>Thông báo</a>
                <a class="nav-link text-warning" href="#" id="logout-btn"><i class="bi bi-box-arrow-right me-1"></i>Đăng xuất</a>
            </div>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1 fw-bold"><i class="bi bi-person-circle me-2"></i>Hồ sơ Companion</h1>
            <p class="text-muted mb-0">Cập nhật thông tin cá nhân và thiết lập dịch vụ</p>
        </div>
        <span id="auth-user" class="badge text-bg-primary"></span>
    </div>
    <div id="alert-box"></div>

    <section class="card shadow-sm mb-4">
        <div class="card-body p-4">
            <h2 class="h5"><i class="bi bi-pencil-square ms-3 me-2"></i>Thông tin cá nhân</h2>
            <form id="profile-form" class="row g-3 mt-2">
                <div class="col-12">
                    <label for="bio" class="form-label"><i class="bi bi-person-lines-fill me-1"></i>Tiểu sử</label>
                    <textarea id="bio" class="form-control" rows="3" required></textarea>
                </div>
                <div class="col-md-6">
                    <label for="hobbies" class="form-label"><i class="bi bi-heart me-1"></i>Sở thích</label>
                    <input id="hobbies" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label for="appearance" class="form-label"><i class="bi bi-emoji-smile me-1"></i>Ngoại hình</label>
                    <input id="appearance" class="form-control" required>
                </div>
                <div class="col-12">
                    <label for="availability-text" class="form-label"><i class="bi bi-clock me-1"></i>Thông tin lịch rảnh tổng quan</label>
                    <input id="availability-text" class="form-control" placeholder="VD: Tối 2-6, 18:00 - 22:00">
                </div>
                <div class="col-md-4">
                    <label for="identity-number" class="form-label"><i class="bi bi-card-text me-1"></i>Số CCCD/CMND</label>
                    <input id="identity-number" class="form-control">
                </div>
                <div class="col-md-4">
                    <label for="identity-image-url" class="form-label"><i class="bi bi-image me-1"></i>URL CCCD/CMND</label>
                    <input id="identity-image-url" class="form-control">
                </div>
                <div class="col-md-4">
                    <label for="portrait-image-url" class="form-label"><i class="bi bi-camera me-1"></i>URL ảnh chân dung</label>
                    <input id="portrait-image-url" class="form-control">
                </div>
                <div class="col-md-6">
                    <label for="intro-media-urls" class="form-label"><i class="bi bi-collection me-1"></i>Album ảnh/video (phẩy phân cách)</label>
                    <textarea id="intro-media-urls" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-md-6">
                    <label for="skills" class="form-label"><i class="bi bi-tools me-1"></i>Kỹ năng / Dịch vụ cung cấp</label>
                    <textarea id="skills" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label"><i class="bi bi-shield-check me-1"></i>Trạng thái hồ sơ</label>
                    <div><span id="companion-status" class="badge text-bg-secondary">N/A</span></div>
                </div>
                <div class="col-md-6 form-check form-switch pt-4">
                    <input class="form-check-input" type="checkbox" id="online-toggle">
                    <label class="form-check-label fw-semibold" for="online-toggle"><i class="bi bi-wifi me-1"></i>Bật trạng thái Online</label>
                </div>
                <div class="col-12 mt-2">
                    <button class="btn btn-primary btn-lg" type="submit"><i class="bi bi-check2-circle me-2"></i>Lưu hồ sơ</button>
                </div>
            </form>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/realtime-stomp.js"></script>
<script src="/js/companion.js"></script>
</body>
</html>
