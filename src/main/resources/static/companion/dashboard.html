<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Khu vuc Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/user/index.html">Companion Rental</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/search.html">Tim kiem</a>
            <a class="nav-link" href="/policy.html">Chinh sach</a>
            <a class="nav-link text-warning" href="#" id="logout-btn">Dang xuat</a>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Khu vuc Companion</h1>
        <span id="auth-user" class="badge text-bg-primary"></span>
    </div>
    <div id="alert-box"></div>
    <p>Dashboard nay la khu vuc lam viec rieng cho team Companion.</p>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function getJson(url, options) {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    (async () => {
        try {
            const auth = await getJson('/api/auth/me');
            if (!auth.authenticated) {
                window.location.href = '/user/login';
                return;
            }
            document.getElementById('auth-user').textContent = `Xin chao, ${auth.username}`;
        } catch (_) {
            window.location.href = '/user/login';
        }
    })();

    document.getElementById('logout-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/user/index.html';
    });
</script>
</body>
</html>
