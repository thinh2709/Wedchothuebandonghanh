<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat/Call - Companion Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/companion.css">
    <style>
        #chat-list {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
        }
        #chat-thread-list .list-group-item-action {
            border-radius: 0;
            transition: all 0.15s ease;
        }
        #chat-thread-list .list-group-item-action:hover {
            background: linear-gradient(135deg, #f5f3ff, #ede9fe);
        }
        #chat-thread-list .list-group-item-action.bg-light {
            background: linear-gradient(135deg, #f5f3ff, #ede9fe) !important;
            border-left: 3px solid #8b5cf6;
        }
    </style>
</head>
<body class="bg-light" data-page="companion-chat">
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/companion/dashboard.html"><i class="bi bi-stars me-2"></i>Companion Center</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#companionNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="companionNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/companion/dashboard.html"><i class="bi bi-grid-1x2 me-1"></i>Tổng quan</a>
                <a class="nav-link" href="/companion/profile.html"><i class="bi bi-person-circle me-1"></i>Hồ sơ</a>
                <a class="nav-link" href="/companion/operations.html"><i class="bi bi-calendar-range me-1"></i>Lịch & Dịch vụ</a>
                <a class="nav-link" href="/companion/bookings.html"><i class="bi bi-bag-check me-1"></i>Đơn hàng</a>
                <a class="nav-link" href="/companion/finance.html"><i class="bi bi-currency-dollar me-1"></i>Tài chính</a>
                <a class="nav-link active" href="/companion/chat.html"><i class="bi bi-chat-dots me-1"></i>Chat/Call</a>
                <a class="nav-link" href="/companion/notifications.html"><i class="bi bi-bell me-1"></i>Thông báo</a>
                <a class="nav-link text-warning" href="#" id="logout-btn"><i class="bi bi-box-arrow-right me-1"></i>Đăng xuất</a>
            </div>
        </div>
    </div>
</nav>
<main class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h4 mb-1 fw-bold"><i class="bi bi-chat-dots-fill me-2"></i>Chat/Call</h1>
                    <p class="text-muted mb-0">Nhắn tin với khách theo từng đơn đặt lịch</p>
                </div>
                <span id="auth-user" class="badge text-bg-primary"></span>
            </div>

            <div class="row g-3">
                <div class="col-lg-4">
                    <div class="border rounded-3 bg-white overflow-hidden">
                        <div class="p-3 border-bottom fw-semibold bg-light">
                            <i class="bi bi-chat-left-text me-2"></i>Danh sách cuộc trò chuyện
                        </div>
                        <div id="chat-thread-list" style="max-height: 420px; overflow: auto;"></div>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <div>
                            <div class="fw-semibold" id="chat-thread-title">Chưa chọn cuộc trò chuyện</div>
                            <div class="text-muted small">Booking ID: <span id="chat-booking-id-text">-</span></div>
                        </div>
                        <button id="call-btn" class="btn btn-outline-success btn-sm">
                            <i class="bi bi-telephone-fill me-1"></i>Lấy thông tin Call
                        </button>
                    </div>
                    <div id="call-info" class="mb-3"></div>
                    <div id="chat-list" class="border rounded-3 p-3 mb-3" style="height: 340px; overflow: auto;"></div>
                    <form id="chat-form" class="input-group">
                        <input id="chat-content" class="form-control" placeholder="Nhập tin nhắn...">
                        <button class="btn btn-primary" type="submit"><i class="bi bi-send-fill me-1"></i>Gửi</button>
                    </form>
                </div>
            </div>
            <div id="chat-message" class="mt-3"></div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/realtime-stomp.js"></script>
<script src="/js/companion.js"></script>
</body>
</html>
