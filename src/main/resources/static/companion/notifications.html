<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thông báo - Companion Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/companion.css">
    <style>
        .notif-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }
        .notif-item:hover {
            background: linear-gradient(135deg, #f5f3ff, #faf5ff);
        }
        .notif-item.unread {
            background: linear-gradient(135deg, #f5f3ff, #ede9fe);
            border-left: 4px solid #8b5cf6;
        }
        .notif-item.unread .notif-title {
            font-weight: 700;
        }
        .notif-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8b5cf6;
            display: inline-block;
            flex-shrink: 0;
        }
        .notif-time {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .notif-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.1rem;
        }
        .notif-count-badge {
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.35em 0.85em;
            border-radius: 100px;
        }
    </style>
</head>
<body class="bg-light" data-page="companion-notifications">
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/companion/dashboard.html"><i class="bi bi-stars me-2"></i>Companion Center</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#companionNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="companionNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/companion/dashboard.html"><i class="bi bi-grid-1x2 me-1"></i>Tổng quan</a>
                <a class="nav-link" href="/companion/profile.html"><i class="bi bi-person-circle me-1"></i>Hồ sơ</a>
                <a class="nav-link" href="/companion/operations.html"><i class="bi bi-calendar-range me-1"></i>Lịch & Dịch vụ</a>
                <a class="nav-link" href="/companion/bookings.html"><i class="bi bi-bag-check me-1"></i>Đơn hàng</a>
                <a class="nav-link" href="/companion/finance.html"><i class="bi bi-currency-dollar me-1"></i>Tài chính</a>
                <a class="nav-link active" href="/companion/notifications.html"><i class="bi bi-bell me-1"></i>Thông báo</a>
                <a class="nav-link text-warning" href="#" id="logout-btn"><i class="bi bi-box-arrow-right me-1"></i>Đăng xuất</a>
            </div>
        </div>
    </div>
</nav>
<main class="container py-4" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1 fw-bold"><i class="bi bi-bell-fill me-2"></i>Thông báo</h1>
            <p class="text-muted mb-0">Cập nhật mới nhất về booking và dịch vụ</p>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <span id="unread-count" class="notif-count-badge">0 chưa đọc</span>
            <button id="mark-all-read-btn" class="btn btn-outline-primary btn-sm">
                <i class="bi bi-check2-all me-1"></i>Đọc tất cả
            </button>
        </div>
    </div>
    <div id="alert-box"></div>

    <div class="card overflow-hidden">
        <div id="notification-list">
            <div class="text-center py-5">
                <div class="spinner-border text-primary mb-3" role="status"></div>
                <p class="text-muted mb-0">Đang tải thông báo...</p>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/companion.js"></script>
</body>
</html>
