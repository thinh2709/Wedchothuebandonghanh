<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Kiem duyet noi dung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">Companion Admin</div>
        <nav class="nav flex-column gap-1">
            <a class="nav-link" href="/admin/dashboard.html">Dashboard</a>
            <a class="nav-link" href="/admin/users.html">Quan ly nguoi dung</a>
            <a class="nav-link active" href="/admin/moderation.html">Kiem duyet noi dung</a>
            <a class="nav-link" href="/admin/transactions.html">Giao dich & dong tien</a>
            <a class="nav-link" href="/admin/disputes.html">Xu ly tranh chap</a>
        </nav>
    </aside>

    <div class="admin-main">
        <header class="admin-topbar">
            <h1 class="h4 mb-0">Kiem duyet noi dung</h1>
            <button class="btn btn-outline-light btn-sm" id="logout-btn">Dang xuat</button>
        </header>

        <main class="admin-content">
            <div id="admin-alert" class="mb-3"></div>

            <section class="card panel-card mb-3">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>Ho so Companion cho duyet</span>
                    <button class="btn btn-sm btn-primary" id="reload-moderation-btn">Tai lai</button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>User</th>
                                <th>Bio</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody id="moderation-pending-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section class="card panel-card">
                <div class="card-header">Quan ly danh gia vi pham</div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Booking</th>
                                <th>Rating</th>
                                <th>Comment</th>
                                <th>Trang thai</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody id="reviews-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
