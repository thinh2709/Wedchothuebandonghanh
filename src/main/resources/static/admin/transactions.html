<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Giao dịch và dòng tiền</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">Quản trị Companion</div>
        <nav class="nav flex-column gap-1">
            <a class="nav-link" href="/admin/dashboard.html">Bảng điều khiển</a>
            <a class="nav-link" href="/admin/users.html">Quản lý người dùng</a>
            <a class="nav-link" href="/admin/moderation.html">Kiểm duyệt nội dung</a>
            <a class="nav-link active" href="/admin/transactions.html">Giao dịch & dòng tiền</a>
            <a class="nav-link" href="/admin/disputes.html">Xử lý tranh chấp</a>
        </nav>
    </aside>

    <div class="admin-main">
        <header class="admin-topbar">
            <h1 class="h4 mb-0">Quản lý giao dịch & dòng tiền</h1>
            <button class="btn btn-outline-light btn-sm" id="logout-btn" data-cy="admin-logout-btn">Đăng xuất</button>
        </header>

        <main class="admin-content">
            <div id="admin-alert" class="mb-3" data-cy="admin-alert"></div>

            <section class="card panel-card mb-3">
                <div class="card-header">Tỷ lệ hoa hồng</div>
                <div class="card-body">
                    <form id="commission-form" class="row g-2 align-items-end" data-cy="commission-form">
                        <div class="col-sm-6 col-lg-4">
                            <label for="commission-rate" class="form-label">Tỷ lệ hoa hồng (0 - 1)</label>
                            <input id="commission-rate" class="form-control" type="number" min="0" max="1" step="0.01" required data-cy="commission-rate">
                        </div>
                        <div class="col-sm-6 col-lg-2">
                            <button class="btn btn-primary w-100" type="submit" data-cy="save-commission-btn">Lưu</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="card panel-card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>Lệnh rút tiền chờ duyệt</span>
                    <button class="btn btn-sm btn-primary" id="reload-transactions-btn" data-cy="reload-transactions-btn">Tải lại</button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Companion</th>
                                <th>Lịch hẹn</th>
                                <th>Số tiền</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                            </thead>
                            <tbody id="withdrawals-body" data-cy="withdrawals-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
