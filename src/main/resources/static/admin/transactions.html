<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Giao dich va dong tien</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">Companion Admin</div>
        <nav class="nav flex-column gap-1">
            <a class="nav-link" href="/admin/dashboard.html">Dashboard</a>
            <a class="nav-link" href="/admin/users.html">Quan ly nguoi dung</a>
            <a class="nav-link" href="/admin/moderation.html">Kiem duyet noi dung</a>
            <a class="nav-link active" href="/admin/transactions.html">Giao dich & dong tien</a>
            <a class="nav-link" href="/admin/disputes.html">Xu ly tranh chap</a>
        </nav>
    </aside>

    <div class="admin-main">
        <header class="admin-topbar">
            <h1 class="h4 mb-0">Quan ly giao dich & dong tien</h1>
            <button class="btn btn-outline-light btn-sm" id="logout-btn">Dang xuat</button>
        </header>

        <main class="admin-content">
            <div id="admin-alert" class="mb-3"></div>

            <section class="card panel-card mb-3">
                <div class="card-header">Commission rate</div>
                <div class="card-body">
                    <form id="commission-form" class="row g-2 align-items-end">
                        <div class="col-sm-6 col-lg-4">
                            <label for="commission-rate" class="form-label">Ty le hoa hong (0 - 1)</label>
                            <input id="commission-rate" class="form-control" type="number" min="0" max="1" step="0.01" required>
                        </div>
                        <div class="col-sm-6 col-lg-2">
                            <button class="btn btn-primary w-100" type="submit">Luu</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="card panel-card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>Lenh rut tien cho duyet</span>
                    <button class="btn btn-sm btn-primary" id="reload-transactions-btn">Tai lai</button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Companion</th>
                                <th>Booking</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody id="withdrawals-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
