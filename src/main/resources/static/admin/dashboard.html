<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Khu vuc Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/user/index.html">Companion Rental</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-warning" href="#" id="logout-btn">Dang xuat</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <h1 class="h3 mb-3">Khu vuc Admin</h1>
    <p class="text-muted">Dashboard rieng cho team Admin.</p>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Companion cho duyet</h5>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Bio</th>
                        <th>Thao tac</th>
                    </tr>
                    </thead>
                    <tbody id="pending-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
    async function getJson(url, options) {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function loadPending() {
        const rows = document.getElementById('pending-body');
        const data = await getJson('/api/admin/pending-companions');
        rows.innerHTML = '';
        data.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.id}</td>
                <td>${item.user?.username || ''}</td>
                <td>${item.bio || ''}</td>
                <td>
                    <button class="btn btn-sm btn-success" onclick="approve(${item.id})">Duyet</button>
                    <button class="btn btn-sm btn-danger" onclick="reject(${item.id})">Tu choi</button>
                </td>
            `;
            rows.appendChild(tr);
        });
    }

    async function approve(id) {
        await getJson(`/api/admin/approve-companion/${id}`, { method: 'POST' });
        await loadPending();
    }

    async function reject(id) {
        await getJson(`/api/admin/reject-companion/${id}`, { method: 'POST' });
        await loadPending();
    }

    document.getElementById('logout-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/user/index.html';
    });

    loadPending().catch(console.error);
</script>
</body>
</html>
