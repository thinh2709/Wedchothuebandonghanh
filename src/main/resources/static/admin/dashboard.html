<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bảng điều khiển Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">Quản trị Companion</div>
        <nav class="nav flex-column gap-1">
            <a class="nav-link active" href="/admin/dashboard.html">Bảng điều khiển</a>
            <a class="nav-link" href="/admin/users.html">Quản lý người dùng</a>
            <a class="nav-link" href="/admin/moderation.html">Kiểm duyệt nội dung</a>
            <a class="nav-link" href="/admin/transactions.html">Giao dịch & dòng tiền</a>
            <a class="nav-link" href="/admin/disputes.html">Xử lý tranh chấp</a>
        </nav>
    </aside>

    <div class="admin-main">
        <header class="admin-topbar">
            <h1 class="h4 mb-0">Bảng điều khiển</h1>
            <button class="btn btn-outline-light btn-sm" id="logout-btn">Đăng xuất</button>
        </header>

        <main class="admin-content">
            <div id="admin-alert" class="mb-3"></div>

            <section class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-label">Lợi nhuận nền tảng</div>
                        <div class="stat-value" id="stat-profit">0</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-label">Tổng giao dịch</div>
                        <div class="stat-value" id="stat-transactions">0</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-label">Đơn hủy</div>
                        <div class="stat-value" id="stat-cancelled">0</div>
                    </div>
                </div>
            </section>

            <section class="card panel-card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>Companion chờ duyệt</span>
                    <button class="btn btn-sm btn-primary" id="reload-pending-btn">Tải lại</button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Người dùng</th>
                                <th>Tiểu sử</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>
                            <tbody id="pending-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
