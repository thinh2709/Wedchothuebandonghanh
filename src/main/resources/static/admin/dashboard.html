<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bảng điều khiển Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">Quản trị Companion</div>
        <nav class="nav flex-column gap-1">
            <a class="nav-link active" href="/admin/dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Bảng điều khiển</a>
            <a class="nav-link" href="/admin/users.html"><i class="bi bi-people-fill"></i> Quản lý người dùng</a>
            <a class="nav-link" href="/admin/moderation.html"><i class="bi bi-shield-check"></i> Kiểm duyệt nội dung</a>
            <a class="nav-link" href="/admin/transactions.html"><i class="bi bi-cash-stack"></i> Giao dịch & dòng tiền</a>
            <a class="nav-link" href="/admin/disputes.html"><i class="bi bi-flag-fill"></i> Xử lý tranh chấp</a>
            <a class="nav-link" href="/admin/notifications.html"><i class="bi bi-bell-fill"></i> Thông báo</a>
        </nav>
    </aside>

    <div class="admin-main">
        <header class="admin-topbar">
            <div>
                <h1 class="h4 mb-0 fw-bold">Bảng điều khiển</h1>
                <p class="text-muted small mb-0">Tổng quan hoạt động nền tảng</p>
            </div>
            <button class="btn btn-outline-light btn-sm" id="logout-btn" data-cy="admin-logout-btn"><i class="bi bi-box-arrow-right me-1"></i>Đăng xuất</button>
        </header>

        <main class="admin-content">
            <div id="admin-alert" class="mb-3" data-cy="admin-alert"></div>

            <section class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-label"><i class="bi bi-graph-up me-1"></i>Lợi nhuận nền tảng</div>
                        <div class="stat-value" id="stat-profit" data-cy="stat-profit">0</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-label"><i class="bi bi-receipt me-1"></i>Tổng giao dịch</div>
                        <div class="stat-value" id="stat-transactions" data-cy="stat-transactions">0</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-label"><i class="bi bi-x-circle me-1"></i>Đơn hủy</div>
                        <div class="stat-value" id="stat-cancelled" data-cy="stat-cancelled">0</div>
                    </div>
                </div>
            </section>

            <section class="card panel-card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-bar-chart-line-fill me-2"></i>Biểu đồ trực quan</span>
                    <div class="d-flex align-items-center gap-2">
                        <label for="admin-chart-range" class="small text-muted mb-0">Chu kỳ</label>
                        <select id="admin-chart-range" class="form-select form-select-sm" style="width: 130px;">
                            <option value="day">Theo ngày</option>
                            <option value="week">Theo tuần</option>
                            <option value="month" selected>Theo tháng</option>
                            <option value="year">Theo năm</option>
                        </select>
                    </div>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-lg-8">
                            <div class="border rounded p-2 bg-white">
                                <canvas id="admin-events-chart" height="140"></canvas>
                            </div>
                        </div>
                        <div class="col-lg-4">
                            <div class="border rounded p-2 bg-white">
                                <canvas id="admin-source-chart" height="140"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="card panel-card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-hourglass-split me-2"></i>Companion chờ duyệt</span>
                    <button class="btn btn-sm btn-primary" id="reload-pending-btn" data-cy="reload-pending-btn"><i class="bi bi-arrow-clockwise me-1"></i>Tải lại</button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Người dùng</th>
                                <th>Tiểu sử</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>
                            <tbody id="pending-body" data-cy="pending-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
