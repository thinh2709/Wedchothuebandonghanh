<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Quản lý người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">Quản trị Companion</div>
        <nav class="nav flex-column gap-1">
            <a class="nav-link" href="/admin/dashboard.html">Bảng điều khiển</a>
            <a class="nav-link active" href="/admin/users.html">Quản lý người dùng</a>
            <a class="nav-link" href="/admin/moderation.html">Kiểm duyệt nội dung</a>
            <a class="nav-link" href="/admin/transactions.html">Giao dịch & dòng tiền</a>
            <a class="nav-link" href="/admin/disputes.html">Xử lý tranh chấp</a>
        </nav>
    </aside>

    <div class="admin-main">
        <header class="admin-topbar">
            <h1 class="h4 mb-0">Quản lý người dùng</h1>
            <button class="btn btn-outline-light btn-sm" id="logout-btn">Đăng xuất</button>
        </header>

        <main class="admin-content">
            <div id="admin-alert" class="mb-3"></div>
            <div class="row g-3">
                <div class="col-12">
                    <section class="card panel-card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span>Danh sách người dùng</span>
                            <button class="btn btn-sm btn-primary" id="reload-users-btn">Tải lại</button>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table align-middle">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Tên đăng nhập</th>
                                        <th>Email</th>
                                        <th>Vai trò</th>
                                        <th>Trạng thái</th>
                                        <th>Hành động</th>
                                    </tr>
                                    </thead>
                                    <tbody id="users-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="col-12">
                    <section class="card panel-card">
                        <div class="card-header">Danh sách Companion</div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table align-middle">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Người dùng</th>
                                        <th>Trạng thái</th>
                                        <th>Cờ vi phạm</th>
                                        <th>Tiểu sử</th>
                                    </tr>
                                    </thead>
                                    <tbody id="companions-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
