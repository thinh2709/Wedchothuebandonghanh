<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Thông báo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        .notif-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }
        .notif-item:hover {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
        }
        .notif-item.unread {
            background: linear-gradient(135deg, #eff6ff, #f1f5f9);
            border-left: 4px solid #3b82f6;
        }
        .notif-item.unread .notif-title {
            font-weight: 700;
        }
        .notif-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3b82f6;
            display: inline-block;
            flex-shrink: 0;
        }
        .notif-time {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .notif-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.1rem;
        }
        .notif-count-badge {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.35em 0.85em;
            border-radius: 100px;
        }
    </style>
</head>
<body>
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">Quản trị Companion</div>
        <nav class="nav flex-column gap-1">
            <a class="nav-link" href="/admin/dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Bảng điều khiển</a>
            <a class="nav-link" href="/admin/users.html"><i class="bi bi-people-fill"></i> Quản lý người dùng</a>
            <a class="nav-link" href="/admin/moderation.html"><i class="bi bi-shield-check"></i> Kiểm duyệt nội dung</a>
            <a class="nav-link" href="/admin/transactions.html"><i class="bi bi-cash-stack"></i> Giao dịch & dòng tiền</a>
            <a class="nav-link" href="/admin/disputes.html"><i class="bi bi-flag-fill"></i> Xử lý tranh chấp</a>
            <a class="nav-link active" href="/admin/notifications.html"><i class="bi bi-bell-fill"></i> Thông báo</a>
        </nav>
    </aside>

    <div class="admin-main">
        <header class="admin-topbar">
            <div>
                <h1 class="h4 mb-0 fw-bold">Thông báo</h1>
                <p class="text-muted small mb-0">Cập nhật hệ thống và hoạt động</p>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <span id="unread-count" class="notif-count-badge">0 chưa đọc</span>
                <button id="mark-all-read-btn" class="btn btn-outline-primary btn-sm"><i class="bi bi-check2-all me-1"></i>Đọc tất cả</button>
                <button class="btn btn-outline-light btn-sm" id="logout-btn" data-cy="admin-logout-btn"><i class="bi bi-box-arrow-right me-1"></i>Đăng xuất</button>
            </div>
        </header>

        <main class="admin-content">
            <div id="admin-alert" class="mb-3"></div>
            <section class="card panel-card overflow-hidden">
                <div id="notification-list">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary mb-3" role="status"></div>
                        <p class="text-muted mb-0">Đang tải thông báo...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/realtime-stomp.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
