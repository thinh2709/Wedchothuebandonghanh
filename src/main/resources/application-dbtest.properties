# Profile: dbtest — database riêng cho E2E / dev an toàn (không đụng DB production).
# app.e2e-seed-moderation-users kế thừa application.properties (mặc định true).
# Chạy: mvn spring-boot:run -Dspring-boot.run.profiles=dbtest
# Hoặc: java -jar app.jar --spring.profiles.active=dbtest
#
# Lần đầu với DB trống: RealisticDataSeeder tạo dữ liệu mẫu (user khách minhchau1/123456, admin, companion…).
# DbTestModerationSeeder thêm tài khoản e2e_locked / e2e_warned / e2e_banned (mật khẩu 123456).

spring.datasource.url=jdbc:mysql://localhost:3306/rental_companion_db_test?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

server.port=8080
